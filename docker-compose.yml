services:
  evidence-checker:
    build:
      context: .
      args:
        HF_TOKEN: ${HF_TOKEN}       # only used at build time
    ports:
      - "8000:8000"
    environment:
      - CHECKER_API_KEY=${CHECKER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
    # Memory limit — the model + torch + overhead needs ~2.5GB
    deploy:
      resources:
        limits:
          memory: 4G